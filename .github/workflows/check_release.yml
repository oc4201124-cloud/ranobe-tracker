name: Check Release Info

on:
  schedule:
    # 日本時間 9:00 (UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run release check script
        run: node scripts/check_release.js

      - name: Commit release_info.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add release_info.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update release_info.json [skip ci]"
            git push
          fi
